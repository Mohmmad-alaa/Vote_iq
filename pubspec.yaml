name: vote_iq
description: "تطبيق متابعة الناخبين - Voter Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Supabase ──
  supabase_flutter: ^2.8.0

  # ── State Management ──
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # ── Dependency Injection ──
  get_it: ^8.0.3

  # ── Local Storage (Offline-First) ──
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # ── Connectivity ──
  connectivity_plus: ^6.1.1

  # ── Security ──
  flutter_secure_storage: ^9.2.3

  # ── UI ──
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2

  # ── Utils ──
  dartz: ^0.10.1
  intl: ^0.20.2
  excel: ^4.0.6
  file_picker: ^10.3.10
  dropdown_search: ^6.0.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
